#sp.on{transform:none}

<!-- 조작 UI -->
<div id="nav"><span id="pn"></span><button id="prev">‹</button><button id="next">›</button></div>
<div id="hint">← → 이동 &nbsp;·&nbsp; S 스크립트 &nbsp;·&nbsp; F 전체화면</div>
<div id="sp"><div class="t">발표 스크립트</div><div id="st"></div></div>
</div></div>

<script>
const slides=[...document.querySelectorAll('.slide')];let cur=0;
const bar=document.getElementById('bar'),pn=document.getElementById('pn');
const sPanel=document.getElementById('sp'),sText=document.getElementById('st');
const dPanel=document.getElementById('demo-panel');
const dOv=document.getElementById('demo-ov');
const dpIf=document.getElementById('dp-iframe');
const dpTl=document.getElementById('dp-title');

function show(i){
  cur=Math.max(0,Math.min(slides.length-1,i));
  slides.forEach((s,j)=>s.classList.toggle('on',j===cur));
  bar.style.width=((cur+1)/slides.length*100)+'%';
  pn.textContent=(cur+1)+' / '+slides.length;
  sText.textContent=slides[cur].dataset.s||'';
}
function openDemo(url,name){dpIf.src=url;dpTl.textContent=name;dPanel.classList.add('open');dOv.classList.add('open')}
function closeDemo(){dPanel.classList.remove('open');dOv.classList.remove('open');setTimeout(()=>{dpIf.src=''},360)}
const imgModal=document.getElementById('img-modal');
const imgModalImg=document.getElementById('img-modal-img');
const imgModalTitle=document.getElementById('img-modal-title');
function openImg(url,title){imgModalImg.src=url;imgModalTitle.textContent=title||'예시 이미지';imgModal.classList.add('open')}
function closeImg(){imgModal.classList.remove('open')}
function closeImgOnBg(e){if(e.target.id==='img-modal')closeImg()}

document.getElementById('prev').onclick=()=>show(cur-1);
document.getElementById('next').onclick=()=>show(cur+1);
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeImg();closeDemo();return}
  if(imgModal.classList.contains('open'))return;
  if(dPanel.classList.contains('open'))return;
  if(['ArrowRight',' ','PageDown'].includes(e.key)){e.preventDefault();show(cur+1)}
  else if(['ArrowLeft','PageUp'].includes(e.key)){e.preventDefault();show(cur-1)}
  else if(e.key==='Home')show(0);else if(e.key==='End')show(slides.length-1);
  else if(e.key.toLowerCase()==='s')sPanel.classList.toggle('on');
  else if(e.key.toLowerCase()==='f')document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen();
});
let tx=null;
document.addEventListener('touchstart',e=>tx=e.touches[0].clientX,{passive:true});
document.addEventListener('touchend',e=>{if(tx===null)return;const d=e.changedTouches[0].clientX-tx;if(Math.abs(d)>50)show(cur+(d<0?1:-1));tx=null});
function fit(){const s=Math.min(innerWidth/1280,innerHeight/720)*(document.fullscreenElement?1:.97);document.getElementById('deck').style.transform='scale('+s+')'}
addEventListener('resize',fit);document.addEventListener('fullscreenchange',fit);fit();show(0);
</script>
